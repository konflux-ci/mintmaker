codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "api/v1alpha1/zz_generated.deepcopy.go"
  - "api/v1alpha1/dependencyupdatecheck_types.go"
  - "**/mock_*.go"
  - "cmd/"
  - ".github/**"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.toml"
  - "**/*.sh"
  - "**/*.md"

flags:
  unit-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
