name: Validate PRs
on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  go-lint:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Cache go modules
        id: cache-mod
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Download dependencies
        run: go mod download
        if: steps.cache-mod.outputs.cache-hit != 'true'
      - name: Check go mod status
        run: |
          go mod tidy
          if [[ -n $(git status -s) ]]
          then
            echo "Go mod state is not clean:"
            git --no-pager diff
            exit 1
          fi
      - name: Check format
        run: |
          make fmt
          if [[ -n $(git status -s) ]]
          then
            echo "Some files are not properly formatted."
            echo "Please run 'make fmt' and amend your commit."
            git --no-pager diff
            exit 1
          fi
      - name: Check manifests
        run: |
          make generate manifests
          if [[ -n $(git status -s) ]]
          then
            echo "Generated sources are not up to date:"
            git --no-pager diff
            exit 1
          fi
      - name: Check RBAC wildcards
        run: |
          if grep -Fn '*' config/rbac/*.yaml ; then
            echo "RBAC files contain wildcards (*)"
            exit 1
          fi
      - name: Run golangci-lint
        run: make lint

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run markdownlint
        run: npx --yes markdownlint-cli@0.49.0 --config .markdownlint.json '**/*.md'

  kube-linter:
    name: Lint Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan yaml files with kube-linter
        uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
        with:
          version: v0.7.6
          directory: config
          config: .kube-linter.yaml

  workflow-lint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shellcheck and actionlint
        env:
          # Renovate: customManagers in .github/renovate.json
          ACTIONLINT_VERSION: 1.7.12
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          tar xzf "${archive}"
          sudo install -m 755 actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: make actionlint

  agent:
    name: Agent
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check length of AGENTS.md (max 300 lines)
        run: |
          set -euo pipefail
          lines=$(wc -l < AGENTS.md)
          echo "AGENTS.md line count: ${lines}"
          if [ "${lines}" -gt 300 ]; then
            echo "::warning file=AGENTS.md::AGENTS.md has ${lines} lines (max 300)."
            exit 1
          fi

  go-test:
    name: Test Go
    needs: go-lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Cache go modules
        id: cache-mod
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Download dependencies
        run: go mod download
        if: steps.cache-mod.outputs.cache-hit != 'true'
      - name: Run Go Tests
        run: make test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          use_oidc: true
          flags: unit-tests
          files: cover.out
          fail_ci_if_error: false
      - name: Ensure make build succeeds
        run: make build
